<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="РассрочкаПРО" />
  <meta name="theme-color" content="#0f0f13" />
  <title>РассрочкаПРО</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #0f0f13; font-family: Georgia, serif; }
    input, button, textarea, select { font-family: Georgia, serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    const formatRub = (n) =>
      new Intl.NumberFormat("ru-RU", { style: "currency", currency: "RUB", maximumFractionDigits: 0 }).format(n || 0);

    const PIN_KEY = "rassrochka-pin";

    function PinScreen({ onUnlock, onSetPin, hasPin }) {
      const [digits, setDigits] = useState([]);
      const [error, setError] = useState("");
      const [mode, setMode] = useState(hasPin ? "enter" : "set");
      const [confirm, setConfirm] = useState(null);

      const press = (d) => {
        if (digits.length >= 4) return;
        const next = [...digits, d];
        setDigits(next);
        setError("");
        if (next.length === 4) {
          setTimeout(() => handle(next), 150);
        }
      };

      const handle = (next) => {
        const code = next.join("");
        if (mode === "enter") {
          const saved = localStorage.getItem(PIN_KEY);
          if (code === saved) { onUnlock(); }
          else { setError("Неверный PIN"); setDigits([]); }
        } else if (mode === "set") {
          setConfirm(code);
          setMode("confirm");
          setDigits([]);
        } else if (mode === "confirm") {
          if (code === confirm) {
            localStorage.setItem(PIN_KEY, code);
            onSetPin(code);
            onUnlock();
          } else {
            setError("PIN не совпадает, попробуй снова");
            setMode("set");
            setConfirm(null);
            setDigits([]);
          }
        }
      };

      const del = () => setDigits(d => d.slice(0, -1));

      const title = mode === "enter" ? "Введите PIN" : mode === "set" ? "Создайте PIN" : "Повторите PIN";

      return (
        <div style={{ minHeight: "100vh", background: "#0f0f13", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "Georgia, serif" }}>
          <div style={{ width: 40, height: 40, background: "linear-gradient(135deg, #c9a84c, #e8c97a)", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: "bold", color: "#0f0f13", marginBottom: 24 }}>₽</div>
          <div style={{ fontSize: 13, color: "#888", letterSpacing: 2, marginBottom: 32 }}>{title.toUpperCase()}</div>
          <div style={{ display: "flex", gap: 16, marginBottom: 32 }}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{ width: 16, height: 16, borderRadius: "50%", background: digits.length > i ? "#e8c97a" : "#2a2a38", border: "2px solid #2a2a38", transition: "background 0.15s" }} />
            ))}
          </div>
          {error && <div style={{ color: "#e87a7a", fontSize: 12, marginBottom: 20 }}>{error}</div>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 72px)", gap: 14 }}>
            {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k, i) => (
              k === "" ? <div key={i} /> :
              <button key={i} onClick={() => k === "⌫" ? del() : press(String(k))}
                style={{ width: 72, height: 72, borderRadius: "50%", background: k === "⌫" ? "transparent" : "#1a1a24", border: k === "⌫" ? "none" : "1px solid #2a2a38", color: "#e8e4dc", fontSize: k === "⌫" ? 22 : 24, fontWeight: "bold", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                {k}
              </button>
            ))}
          </div>
          {mode === "enter" && (
            <button onClick={() => { if (window.confirm("Сбросить PIN? Все данные сохранятся.")) { localStorage.removeItem(PIN_KEY); setMode("set"); setDigits([]); } }}
              style={{ marginTop: 32, background: "transparent", border: "none", color: "#444", fontSize: 12, cursor: "pointer", fontFamily: "Georgia, serif" }}>
              Забыл PIN
            </button>
          )}
        </div>
      );
    }

    const today = () => new Date().toLocaleDateString("ru-RU");

    function daysSince(dateStr) {
      if (!dateStr) return 0;
      const parts = dateStr.split(".");
      const d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
      return Math.floor((Date.now() - d.getTime()) / 86400000);
    }

    function isOverdue(c) {
      if (c.paid >= c.remaining) return false;
      const lastDate = c.payments.length > 0 ? c.payments[c.payments.length - 1].date : c.date;
      return daysSince(lastDate) > 1;
    }

    function isDueToday(c) {
      if (c.paid >= c.remaining) return false;
      if (!c.nextPaymentDate) return false;
      return c.nextPaymentDate === today();
    }

    const GOLD = "#e8c97a"; const RED = "#e87a7a"; const GREEN = "#7ae87a";
    const BLUE = "#7ab8e8"; const ORANGE = "#e8a87a";
    const BG = "#0f0f13"; const CARD = "#1a1a24"; const BORDER = "#2a2a38";

    const STATUS_CONFIG = {
      reliable: { label: "Надёжный", color: GREEN, icon: "⭐" },
      neutral:  { label: "Обычный",  color: "#888", icon: "👤" },
      problem:  { label: "Проблемный", color: ORANGE, icon: "⚠️" },
      blacklist:{ label: "Чёрный список", color: RED, icon: "🚫" },
    };

    const STORAGE_KEY = "rassrochka-data-v3";

    function saveData(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
      catch (e) { console.warn("save failed", e); }
    }
    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) { console.warn("load failed", e); }
      return null;
    }

    function PieChart({ slices, size = 120 }) {
      const r = size / 2;
      let cum = -Math.PI / 2;
      const total = slices.reduce((s, sl) => s + sl.value, 0);
      if (!total) return null;
      return (
        <svg width={size} height={size}>
          {slices.map((sl, i) => {
            const angle = (sl.value / total) * 2 * Math.PI;
            const x1 = r + r * Math.cos(cum), y1 = r + r * Math.sin(cum);
            cum += angle;
            const x2 = r + r * Math.cos(cum), y2 = r + r * Math.sin(cum);
            return <path key={i} d={`M${r},${r} L${x1},${y1} A${r},${r} 0 ${angle > Math.PI ? 1 : 0},1 ${x2},${y2} Z`} fill={sl.color} stroke={BG} strokeWidth={2} />;
          })}
          <circle cx={r} cy={r} r={r * 0.45} fill={BG} />
        </svg>
      );
    }

    function ImagePicker({ value, onChange, label, size = 80 }) {
      const ref = useRef();
      const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => onChange(ev.target.result);
        reader.readAsDataURL(file);
      };
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
          <div onClick={() => ref.current.click()} style={{
            width: size, height: size, borderRadius: 10,
            background: value ? "transparent" : "#12121a",
            border: `2px dashed ${BORDER}`, cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            overflow: "hidden", flexShrink: 0,
          }}>
            {value
              ? <img src={value} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="" />
              : <span style={{ fontSize: 24, color: "#444" }}>📷</span>}
          </div>
          <span style={{ fontSize: 9, color: "#555", letterSpacing: 1 }}>{label}</span>
          <input ref={ref} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{ display: "none" }} />
        </div>
      );
    }

    const inputStyle = {
      width: "100%", padding: "12px 14px",
      background: "#12121a", border: `1px solid ${BORDER}`,
      borderRadius: 10, color: "#e8e4dc",
      fontSize: 14, fontFamily: "Georgia, serif",
      outline: "none", boxSizing: "border-box",
    };

    function QuickCalc() {
      const [price, setPrice] = useState("");
      const [months, setMonths] = useState("");
      const [hasAdv, setHasAdv] = useState(false);
      const [adv, setAdv] = useState("");
      const [cost, setCost] = useState("");

      const calc = useMemo(() => {
        const p = parseFloat(price) || 0;
        const m = parseInt(months) || 0;
        const a = parseFloat(adv) || 0;
        const c = parseFloat(cost) || 0;
        if (!p || !m) return null;
        const rate = m * 5 + (!hasAdv ? 5 : 0);
        const total = p * (1 + rate / 100);
        const remaining = hasAdv ? total - a : total;
        const monthly = remaining / m;
        const profit = total - p + (p - c);
        return { rate, total, remaining, monthly, profit: c > 0 ? profit : total - p };
      }, [price, months, hasAdv, adv, cost]);

      return (
        <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 14, padding: 18, marginBottom: 18 }}>
          <div style={{ fontSize: 11, color: GOLD, letterSpacing: 1, marginBottom: 14 }}>🧮 БЫСТРЫЙ КАЛЬКУЛЯТОР</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
            <input value={price} onChange={e => setPrice(e.target.value)} placeholder="Цена товара (₽)" type="number" style={inputStyle} />
            <input value={months} onChange={e => setMonths(e.target.value)} placeholder="Месяцев" type="number" style={inputStyle} />
            <input value={cost} onChange={e => setCost(e.target.value)} placeholder="Себестоимость (₽)" type="number" style={inputStyle} />
            <input value={adv} onChange={e => setAdv(e.target.value)} placeholder="Взнос (₽)" type="number" style={{ ...inputStyle, opacity: hasAdv ? 1 : 0.4 }} disabled={!hasAdv} />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <input type="checkbox" id="calcAdv" checked={hasAdv} onChange={e => setHasAdv(e.target.checked)} style={{ accentColor: GOLD, width: 16, height: 16 }} />
            <label htmlFor="calcAdv" style={{ fontSize: 13, cursor: "pointer" }}>Есть первый взнос</label>
          </div>
          {calc && (
            <div style={{ background: "#12121a", borderRadius: 10, padding: 14 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {[
                  { label: "Ставка", value: `${calc.rate}%`, color: "#aaa" },
                  { label: "Итого с клиента", value: formatRub(calc.total), color: "#aaa" },
                  { label: "Ежемесячно", value: formatRub(Math.round(calc.monthly)), color: GOLD },
                  { label: "Ваша прибыль", value: formatRub(Math.round(calc.profit)), color: GREEN },
                ].map((r, i) => (
                  <div key={i}>
                    <div style={{ fontSize: 9, color: "#555", marginBottom: 3 }}>{r.label}</div>
                    <div style={{ fontSize: i === 2 || i === 3 ? 18 : 14, fontWeight: "bold", color: r.color }}>{r.value}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function SectionLabel({ text }) {
      return <div style={{ fontSize: 9, color: "#444", letterSpacing: 2, marginBottom: 8, marginTop: 4 }}>{text}</div>;
    }

    function Field({ label, children }) {
      return (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 9, color: "#555", letterSpacing: 1, marginBottom: 7 }}>{label.toUpperCase()}</div>
          {children}
        </div>
      );
    }

    function ClientCard({ c, onDelete, onPayment, onPartialPayment, onOverdue, onArchive, onStatusChange, onCommentChange, done, overdue, dueToday }) {
      const [open, setOpen] = useState(false);
      const [partialMode, setPartialMode] = useState(false);
      const [partialAmount, setPartialAmount] = useState("");
      const [editComment, setEditComment] = useState(false);
      const [commentVal, setCommentVal] = useState(c.comment || "");
      const [showStatusMenu, setShowStatusMenu] = useState(false);

      const progress = c.remaining > 0 ? Math.min((c.paid / c.remaining) * 100, 100) : 100;
      const left = Math.max(0, c.remaining - c.paid);
      const paymentsLeft = Math.ceil(left / c.monthly);
      const statusCfg = STATUS_CONFIG[c.status] || STATUS_CONFIG.neutral;

      const borderColor = done ? "#2a3a2a" : dueToday ? GREEN + "88" : overdue ? RED + "88" : BORDER;
      const nameColor = done ? GREEN : overdue ? RED : dueToday ? GREEN : "#e8e4dc";

      const handlePartial = (e) => {
        e.stopPropagation();
        const amt = parseFloat(partialAmount);
        if (!amt || amt <= 0) return;
        onPartialPayment(c.id, amt);
        setPartialAmount(""); setPartialMode(false);
      };

      const saveComment = (e) => {
        e.stopPropagation();
        onCommentChange(c.id, commentVal);
        setEditComment(false);
      };

      return (
        <div style={{ background: CARD, border: `1px solid ${borderColor}`, borderRadius: 14, marginBottom: 10, overflow: "hidden", opacity: done ? 0.8 : 1 }}>
          <div onClick={() => setOpen(o => !o)} style={{ padding: "13px 14px", cursor: "pointer" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
              {c.photoItem && (
                <img src={c.photoItem} style={{ width: 44, height: 44, borderRadius: 8, objectFit: "cover", flexShrink: 0 }} alt="" />
              )}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontWeight: "bold", fontSize: 15, color: nameColor }}>
                    {done ? "✓ " : ""}{c.name}
                  </span>
                  <span style={{ fontSize: 12 }} title={statusCfg.label}>{statusCfg.icon}</span>
                  {dueToday && !done && <span style={{ fontSize: 10, color: GREEN, background: "#1a3a1a", padding: "1px 6px", borderRadius: 8 }}>сегодня</span>}
                </div>
                {c.phone && (
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 2 }}>
                    <a href={`tel:${c.phone}`} onClick={e => e.stopPropagation()} style={{ fontSize: 11, color: BLUE, textDecoration: "none" }}>
                      📞 {c.phone}
                    </a>
                    <a href={`https://wa.me/${c.phone.replace(/\D/g, "")}`} onClick={e => e.stopPropagation()} target="_blank" rel="noreferrer" style={{ fontSize: 11, color: "#25d366", textDecoration: "none", background: "#1a2e1a", border: "1px solid #25d36644", borderRadius: 6, padding: "1px 7px" }}>
                      WA
                    </a>
                  </div>
                )}
                <div style={{ fontSize: 10, color: "#444", marginTop: 2 }}>с {c.date} · {c.months} мес · {c.rate}%</div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <div style={{ fontSize: 15, fontWeight: "bold", color: GOLD }}>
                  {formatRub(Math.round(c.monthly))}<span style={{ fontSize: 9, color: "#555" }}>/мес</span>
                </div>
                {!done && <div style={{ fontSize: 10, color: overdue ? RED : "#555", marginTop: 2 }}>{overdue ? "просрочка!" : `ост. ${paymentsLeft} пл.`}</div>}
                {c.nextPaymentDate && !done && <div style={{ fontSize: 9, color: "#444", marginTop: 2 }}>след. {c.nextPaymentDate}</div>}
              </div>
            </div>
            <div style={{ marginTop: 10, background: "#0f0f13", borderRadius: 5, height: 5, overflow: "hidden" }}>
              <div style={{ width: `${progress}%`, height: "100%", background: done ? `linear-gradient(90deg, #3a7a3a, ${GREEN})` : overdue ? `linear-gradient(90deg, #7a2a2a, ${RED})` : `linear-gradient(90deg, #c9a84c, ${GOLD})`, borderRadius: 5, transition: "width 0.5s" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4, fontSize: 9, color: "#444" }}>
              <span>Оплачено {formatRub(c.paid)}</span>
              <span>{Math.round(progress)}%</span>
              <span>Итого {formatRub(c.remaining)}</span>
            </div>
          </div>

          {open && (
            <div style={{ padding: "0 14px 14px", borderTop: `1px solid ${BORDER}` }}>
              {(c.photoItem || c.photoDoc) && (
                <div style={{ display: "flex", gap: 10, paddingTop: 14, marginBottom: 12 }}>
                  {c.photoItem && (
                    <div style={{ textAlign: "center" }}>
                      <img src={c.photoItem} style={{ width: 80, height: 80, borderRadius: 10, objectFit: "cover" }} alt="" />
                      <div style={{ fontSize: 9, color: "#555", marginTop: 4 }}>ТОВАР</div>
                    </div>
                  )}
                  {c.photoDoc && (
                    <div style={{ textAlign: "center" }}>
                      <img src={c.photoDoc} style={{ width: 80, height: 80, borderRadius: 10, objectFit: "cover" }} alt="" />
                      <div style={{ fontSize: 9, color: "#555", marginTop: 4 }}>ДОКУМЕНТ</div>
                    </div>
                  )}
                </div>
              )}

              <div style={{ paddingTop: c.photoItem || c.photoDoc ? 0 : 14, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
                {[
                  { label: "Цена товара", value: formatRub(c.price) },
                  { label: "Итоговая сумма", value: formatRub(c.total) },
                  { label: "Первый взнос", value: c.hasAdvance ? formatRub(c.advance) : "Нет" },
                  { label: "Остаток долга", value: formatRub(left) },
                  ...(c.costPrice > 0 ? [{ label: "Себестоимость", value: formatRub(c.costPrice) }, { label: "Прибыль", value: formatRub(c.total - c.costPrice) }] : []),
                ].map((item, i) => (
                  <div key={i} style={{ background: "#12121a", borderRadius: 8, padding: "8px 10px" }}>
                    <div style={{ fontSize: 9, color: "#555", marginBottom: 3 }}>{item.label}</div>
                    <div style={{ fontSize: 13, fontWeight: "bold" }}>{item.value}</div>
                  </div>
                ))}
              </div>

              <div style={{ marginBottom: 12 }}>
                {editComment ? (
                  <div style={{ display: "flex", gap: 6 }}>
                    <textarea value={commentVal} onChange={e => setCommentVal(e.target.value)} onClick={e => e.stopPropagation()} rows={2} style={{ ...inputStyle, flex: 1, resize: "none", fontSize: 12, padding: "8px 10px" }} />
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      <button onClick={saveComment} style={{ padding: "6px 10px", background: "#1a3a1a", color: GREEN, border: `1px solid ${GREEN}44`, borderRadius: 8, cursor: "pointer", fontSize: 13 }}>✓</button>
                      <button onClick={(e) => { e.stopPropagation(); setEditComment(false); }} style={{ padding: "6px 10px", background: "#2a1a1a", color: RED, border: `1px solid ${RED}44`, borderRadius: 8, cursor: "pointer", fontSize: 13 }}>✕</button>
                    </div>
                  </div>
                ) : (
                  <div onClick={(e) => { e.stopPropagation(); setEditComment(true); }} style={{ background: "#12121a", borderRadius: 8, padding: "8px 10px", cursor: "pointer", minHeight: 34 }}>
                    <div style={{ fontSize: 9, color: "#555", marginBottom: 4 }}>КОММЕНТАРИЙ (нажмите чтобы изменить)</div>
                    <div style={{ fontSize: 12, color: c.comment ? "#aaa" : "#444" }}>{c.comment || "Добавить заметку..."}</div>
                  </div>
                )}
              </div>

              {!done && (
                <div style={{ marginBottom: 12, position: "relative" }}>
                  <button onClick={(e) => { e.stopPropagation(); setShowStatusMenu(s => !s); }} style={{ width: "100%", padding: "9px 12px", background: "#12121a", border: `1px solid ${statusCfg.color}44`, borderRadius: 10, color: statusCfg.color, cursor: "pointer", fontFamily: "inherit", fontSize: 12, textAlign: "left" }}>
                    {statusCfg.icon} Статус: {statusCfg.label} ▼
                  </button>
                  {showStatusMenu && (
                    <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#1a1a2a", border: `1px solid ${BORDER}`, borderRadius: 10, zIndex: 10, overflow: "hidden" }}>
                      {Object.entries(STATUS_CONFIG).map(([k, v]) => (
                        <button key={k} onClick={(e) => { e.stopPropagation(); onStatusChange(c.id, k); setShowStatusMenu(false); }} style={{ width: "100%", padding: "10px 14px", background: "transparent", border: "none", borderBottom: `1px solid ${BORDER}`, color: v.color, cursor: "pointer", fontFamily: "inherit", fontSize: 13, textAlign: "left" }}>
                          {v.icon} {v.label}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {c.payments.length > 0 && (
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 9, color: "#555", letterSpacing: 1, marginBottom: 6 }}>ИСТОРИЯ ПЛАТЕЖЕЙ</div>
                  {c.payments.map((p, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#666", marginBottom: 3 }}>
                      <span>#{i + 1} · {p.date}{p.type === "partial" ? " (часть)" : ""}</span>
                      <span style={{ color: GREEN }}>+{formatRub(p.amount)}</span>
                    </div>
                  ))}
                </div>
              )}

              {partialMode && !done && (
                <div style={{ marginBottom: 10, display: "flex", gap: 6 }}>
                  <input type="number" value={partialAmount} onChange={e => setPartialAmount(e.target.value)} onClick={e => e.stopPropagation()} placeholder="Сумма частичного платежа" style={{ ...inputStyle, flex: 1, padding: "9px 12px", fontSize: 13 }} />
                  <button onClick={handlePartial} style={{ padding: "9px 12px", background: "#1a3a1a", color: GREEN, border: `1px solid ${GREEN}44`, borderRadius: 10, cursor: "pointer" }}>✓</button>
                  <button onClick={(e) => { e.stopPropagation(); setPartialMode(false); }} style={{ padding: "9px 12px", background: "#2a1a1a", color: RED, border: `1px solid ${RED}44`, borderRadius: 10, cursor: "pointer" }}>✕</button>
                </div>
              )}

              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {!done && c.phone && (
                  <a
                    href={`https://wa.me/${c.phone.replace(/\D/g, "")}?text=${encodeURIComponent(`Здравствуйте, ${c.name}! Напоминаем об оплате рассрочки: ${formatRub(Math.round(left > c.monthly ? c.monthly : left))} до ${c.nextPaymentDate || "конца месяца"}. Спасибо!`)}`}
                    target="_blank" rel="noreferrer"
                    onClick={e => e.stopPropagation()}
                    style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 5, padding: "10px 10px", background: "#1a2e1a", color: "#25d366", border: "1px solid #25d36644", borderRadius: 10, fontSize: 12, fontWeight: "bold", textDecoration: "none", cursor: "pointer" }}
                  >
                    💬 WA
                  </a>
                )}
                {!done && (
                  <button onClick={(e) => { e.stopPropagation(); onPayment(c.id); }} style={{ flex: 1, minWidth: 80, padding: "10px 6px", background: "linear-gradient(135deg, #2a5a2a, #3a7a3a)", color: "#fff", border: "none", borderRadius: 10, fontSize: 12, fontWeight: "bold", cursor: "pointer", fontFamily: "inherit" }}>
                    ✓ Платёж
                  </button>
                )}
                {!done && (
                  <button onClick={(e) => { e.stopPropagation(); setPartialMode(m => !m); }} style={{ padding: "10px 10px", background: partialMode ? "#1a3a1a" : "#1a1a2a", color: partialMode ? GREEN : "#666", border: `1px solid ${partialMode ? GREEN + "44" : BORDER}`, borderRadius: 10, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
                    ½
                  </button>
                )}
                {!done && (
                  <button onClick={(e) => { e.stopPropagation(); onOverdue(c.id); }} style={{ padding: "10px 10px", background: (c.overdueMarked || isOverdue(c)) ? "#3a1a1a" : "#1a1a2a", color: (c.overdueMarked || isOverdue(c)) ? RED : "#555", border: `1px solid ${(c.overdueMarked || isOverdue(c)) ? RED + "44" : BORDER}`, borderRadius: 10, fontSize: 12, cursor: "pointer" }}>
                    ⚠
                  </button>
                )}
                <button onClick={(e) => { e.stopPropagation(); onArchive(c.id); }} style={{ padding: "10px 10px", background: "#1a1a2a", color: "#888", border: `1px solid ${BORDER}`, borderRadius: 10, fontSize: 12, cursor: "pointer" }}>
                  📦
                </button>
                <button onClick={(e) => { e.stopPropagation(); onDelete(c.id); }} style={{ padding: "10px 10px", background: "#2a1a1a", color: RED, border: `1px solid #3a2a2a`, borderRadius: 10, fontSize: 12, cursor: "pointer" }}>
                  🗑
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [unlocked, setUnlocked] = useState(false);
      const [hasPin, setHasPin] = useState(!!localStorage.getItem(PIN_KEY));
      const [tab, setTab] = useState("home");
      const [sortAlpha, setSortAlpha] = useState("alpha_asc");
      const [clients, setClients] = useState([]);
      const [archived, setArchived] = useState([]);
      const [cassa, setCassa] = useState({ balance: 0, investments: [], withdrawals: [] });
      const [search, setSearch] = useState("");
      const [notification, setNotification] = useState(null);
      const [filterStatus, setFilterStatus] = useState("all");
      const [showArchive, setShowArchive] = useState(false);

      const [form, setForm] = useState({ name: "", phone: "", price: "", months: "", hasAdvance: false, advance: "", nextPaymentDate: "", costPrice: "", status: "neutral", photoItem: "", photoDoc: "", comment: "", guarantorName: "", guarantorPhone: "", guarantorPhoto: "" });
      const [formError, setFormError] = useState("");
      const [cassaForm, setCassaForm] = useState({ type: "investment", amount: "", note: "" });

      useEffect(() => {
        const data = loadData();
        if (data) {
          setClients(data.clients || []);
          setArchived(data.archived || []);
          setCassa(data.cassa || { balance: 0, investments: [], withdrawals: [] });
        }
      }, []);

      useEffect(() => {
        saveData({ clients, archived, cassa });
      }, [clients, archived, cassa]);

      const showNotif = (msg, type = "success") => {
        setNotification({ msg, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const calcPreview = () => {
        const price = parseFloat(form.price) || 0;
        const months = parseInt(form.months) || 0;
        const cost = parseFloat(form.costPrice) || 0;
        if (!price || !months) return null;
        const rate = months * 5 + (!form.hasAdvance ? 5 : 0);
        const total = price * (1 + rate / 100);
        const remaining = form.hasAdvance ? total - (parseFloat(form.advance) || 0) : total;
        const monthly = remaining / months;
        const profitPercent = total - price;
        const profitTotal = cost > 0 ? (total - cost) : profitPercent;
        return { rate, total, remaining, monthly, profitPercent, profitTotal, hasCost: cost > 0 };
      };
      const preview = calcPreview();

      const addClient = () => {
        if (!form.name.trim()) { setFormError("Введите имя клиента"); return; }
        if (!form.price || parseFloat(form.price) <= 0) { setFormError("Введите цену товара"); return; }
        if (!form.months || parseInt(form.months) <= 0) { setFormError("Введите срок в месяцах"); return; }
        if (form.hasAdvance && (!form.advance || parseFloat(form.advance) <= 0)) { setFormError("Введите сумму взноса"); return; }
        setFormError("");
        const p = preview;
        const client = {
          id: Date.now(),
          name: form.name.trim(), phone: form.phone.trim(),
          price: parseFloat(form.price), months: parseInt(form.months),
          hasAdvance: form.hasAdvance, advance: parseFloat(form.advance) || 0,
          costPrice: parseFloat(form.costPrice) || 0,
          rate: p.rate, total: p.total, remaining: p.remaining, monthly: p.monthly,
          paid: 0, payments: [],
          date: today(), nextPaymentDate: form.nextPaymentDate || "",
          overdueMarked: false, status: form.status,
          photoItem: form.photoItem, photoDoc: form.photoDoc,
          comment: form.comment.trim(),
          guarantorName: form.guarantorName.trim(),
          guarantorPhone: form.guarantorPhone.trim(),
          guarantorPhoto: form.guarantorPhoto,
        };
        setClients(prev => [client, ...prev]);
        setForm({ name: "", phone: "", price: "", months: "", hasAdvance: false, advance: "", nextPaymentDate: "", costPrice: "", status: "neutral", photoItem: "", photoDoc: "", comment: "", guarantorName: "", guarantorPhone: "", guarantorPhoto: "" });
        setTab("home");
        showNotif(`Клиент ${client.name} добавлен`);
      };

      const deleteClient = (id) => { setClients(prev => prev.filter(c => c.id !== id)); showNotif("Клиент удалён", "error"); };
      const archiveClient = (id) => {
        const c = clients.find(c => c.id === id); if (!c) return;
        setClients(prev => prev.filter(x => x.id !== id));
        setArchived(prev => [{ ...c, archivedDate: today() }, ...prev]);
        showNotif("Клиент перемещён в архив");
      };
      const unarchiveClient = (id) => {
        const c = archived.find(c => c.id === id); if (!c) return;
        setArchived(prev => prev.filter(x => x.id !== id));
        setClients(prev => [c, ...prev]);
        showNotif("Клиент восстановлен");
      };
      const updateStatus = (id, status) => setClients(prev => prev.map(c => c.id === id ? { ...c, status } : c));
      const updateComment = (id, comment) => setClients(prev => prev.map(c => c.id === id ? { ...c, comment } : c));

      const markPayment = (id) => {
        setClients(prev => prev.map(c => {
          if (c.id !== id) return c;
          const amount = Math.min(c.monthly, c.remaining - c.paid);
          const newPaid = c.paid + amount;
          const nd = new Date(); nd.setDate(nd.getDate() + 30);
          return { ...c, paid: newPaid, overdueMarked: false, nextPaymentDate: newPaid >= c.remaining ? "" : nd.toLocaleDateString("ru-RU"), payments: [...c.payments, { date: today(), amount, type: "full" }] };
        }));
        showNotif("Платёж записан ✓");
      };

      const markPartialPayment = (id, amount) => {
        setClients(prev => prev.map(c => {
          if (c.id !== id) return c;
          const safe = Math.min(amount, c.remaining - c.paid);
          if (safe <= 0) return c;
          const newPaid = c.paid + safe;
          const nd = new Date(); nd.setDate(nd.getDate() + 30);
          return { ...c, paid: newPaid, overdueMarked: false, nextPaymentDate: newPaid >= c.remaining ? "" : nd.toLocaleDateString("ru-RU"), payments: [...c.payments, { date: today(), amount: safe, type: "partial" }] };
        }));
        showNotif("Частичный платёж записан ✓");
      };

      const toggleOverdue = (id) => setClients(prev => prev.map(c => c.id === id ? { ...c, overdueMarked: !c.overdueMarked } : c));

      const addCassaOp = () => {
        const amount = parseFloat(cassaForm.amount);
        if (!amount || amount <= 0) return;
        const op = { id: Date.now(), type: cassaForm.type, amount, note: cassaForm.note.trim(), date: today() };
        setCassa(prev => ({
          balance: prev.balance + (op.type === "withdrawal" ? -amount : amount),
          investments: op.type === "investment" ? [...prev.investments, op] : prev.investments,
          withdrawals: op.type === "withdrawal" ? [...prev.withdrawals, op] : prev.withdrawals,
        }));
        setCassaForm({ type: "investment", amount: "", note: "" });
        showNotif(op.type === "investment" ? "Инвестиция добавлена" : "Снятие записано");
      };

      const stats = useMemo(() => {
        const active = clients.filter(c => c.paid < c.remaining);
        const done = clients.filter(c => c.paid >= c.remaining && c.remaining > 0);
        const overdue = clients.filter(c => c.overdueMarked || isOverdue(c));
        const dueToday = clients.filter(c => isDueToday(c));
        const totalDebt = active.reduce((s, c) => s + (c.remaining - c.paid), 0);
        const totalReceived = clients.reduce((s, c) => s + c.paid, 0);
        const totalProfit = clients.reduce((s, c) => s + (c.costPrice > 0 ? c.total - c.costPrice : c.total - c.price), 0);
        const nextMonth = active.reduce((s, c) => s + c.monthly, 0);
        const monthly = {};
        clients.forEach(c => c.payments.forEach(p => {
          const key = p.date.slice(3);
          monthly[key] = (monthly[key] || 0) + p.amount;
        }));
        return { active, done, overdue, dueToday, totalDebt, totalReceived, totalProfit, nextMonth, monthly };
      }, [clients]);

      const exportCSV = () => {
        const rows = [["Имя", "Телефон", "Товар (₽)", "Себест. (₽)", "Итого (₽)", "Ежемес. (₽)", "Оплачено (₽)", "Остаток (₽)", "Статус", "Дата"]];
        clients.forEach(c => {
          const status = c.paid >= c.remaining ? "Завершён" : (c.overdueMarked || isOverdue(c)) ? "Просрочка" : "Активен";
          rows.push([c.name, c.phone, c.price, c.costPrice || "", Math.round(c.total), Math.round(c.monthly), Math.round(c.paid), Math.round(c.remaining - c.paid), status, c.date]);
        });
        const csv = rows.map(r => r.join(";")).join("\n");
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = "рассрочка.csv"; a.click();
        showNotif("Файл скачан ✓");
      };

      const sortFn = (a, b) => {
        if (sortAlpha === "alpha_asc") return a.name.localeCompare(b.name, "ru");
        if (sortAlpha === "alpha_desc") return b.name.localeCompare(a.name, "ru");
        if (sortAlpha === "date_asc") return a.id - b.id;
        if (sortAlpha === "date_desc") return b.id - a.id;
        if (sortAlpha === "sum_asc") return a.remaining - b.remaining;
        if (sortAlpha === "sum_desc") return b.remaining - a.remaining;
        return 0;
      };

      const filtered = stats.active.filter(c => {
        const matchSearch = c.name.toLowerCase().includes(search.toLowerCase()) || c.phone.includes(search);
        const matchStatus = filterStatus === "all" || c.status === filterStatus;
        return matchSearch && matchStatus;
      }).sort(sortFn);
      const filteredDone = stats.done.filter(c =>
        c.name.toLowerCase().includes(search.toLowerCase()) || c.phone.includes(search)
      ).sort(sortFn);

      if (!unlocked) return <PinScreen hasPin={hasPin} onUnlock={() => setUnlocked(true)} onSetPin={() => setHasPin(true)} />;

      const tabs = [
        { key: "home", label: "🏠", title: "Главная" },
        { key: "clients", label: "👤", title: "Клиенты" },
        { key: "add", label: "➕", title: "Добавить" },
        { key: "cassa", label: "💰", title: "Касса" },
        { key: "report", label: "📊", title: "Отчёт" },
      ];

      return (
        <div style={{ minHeight: "100vh", background: BG, color: "#e8e4dc", fontFamily: "Georgia, serif", paddingBottom: 20 }}>
          {notification && (
            <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", background: notification.type === "error" ? "#3a1a1a" : "#1a3a1a", border: `1px solid ${notification.type === "error" ? RED : GREEN}`, color: notification.type === "error" ? RED : GREEN, padding: "10px 22px", borderRadius: 12, zIndex: 1000, fontSize: 13, fontWeight: "bold", boxShadow: "0 8px 32px #0009" }}>
              {notification.msg}
            </div>
          )}

          <div style={{ background: "linear-gradient(135deg, #1a1a24, #0f0f13)", borderBottom: `1px solid ${BORDER}`, padding: "16px 18px", display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 40, height: 40, background: `linear-gradient(135deg, #c9a84c, ${GOLD})`, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: "bold", color: "#0f0f13" }}>₽</div>
            <div>
              <div style={{ fontSize: 18, fontWeight: "bold", color: GOLD }}>РассрочкаПРО</div>
              <div style={{ fontSize: 9, color: "#444", letterSpacing: 2 }}>ДАННЫЕ СОХРАНЯЮТСЯ НА УСТРОЙСТВЕ</div>
            </div>
            <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
              {stats.dueToday.length > 0 && <div style={{ background: "#1a3a1a", border: `1px solid ${GREEN}`, color: GREEN, borderRadius: 20, padding: "3px 10px", fontSize: 11, fontWeight: "bold" }}>💳 {stats.dueToday.length}</div>}
              {stats.overdue.length > 0 && <div style={{ background: "#3a1a1a", border: `1px solid ${RED}`, color: RED, borderRadius: 20, padding: "3px 10px", fontSize: 11, fontWeight: "bold" }}>⚠ {stats.overdue.length}</div>}
              {hasPin && <button onClick={() => setUnlocked(false)} style={{ background: "transparent", border: "none", color: "#444", fontSize: 18, cursor: "pointer", padding: "0 4px" }}>🔒</button>}
            </div>
          </div>

          <div style={{ display: "flex", borderBottom: `1px solid ${BORDER}`, background: "#12121a" }}>
            {tabs.map(t => (
              <button key={t.key} onClick={() => setTab(t.key)} style={{ flex: 1, padding: "11px 2px", background: tab === t.key ? CARD : "transparent", color: tab === t.key ? GOLD : "#555", border: "none", borderBottom: tab === t.key ? `2px solid ${GOLD}` : "2px solid transparent", cursor: "pointer", fontSize: 12, fontFamily: "inherit", transition: "all 0.2s" }}>
                <div style={{ fontSize: 16 }}>{t.label}</div>
                <div style={{ fontSize: 8, letterSpacing: 1, marginTop: 2 }}>{t.title.toUpperCase()}</div>
              </button>
            ))}
          </div>

          <div style={{ padding: "16px 14px", maxWidth: 600, margin: "0 auto" }}>

            {tab === "home" && (
              <div>
                {stats.dueToday.length > 0 && (
                  <div style={{ background: "#1a2a1a", border: `1px solid ${GREEN}44`, borderRadius: 14, padding: 16, marginBottom: 16 }}>
                    <div style={{ fontSize: 11, color: GREEN, letterSpacing: 1, marginBottom: 12 }}>💳 ПЛАТЯТ СЕГОДНЯ</div>
                    {stats.dueToday.map(c => (
                      <div key={c.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, paddingBottom: 8, borderBottom: "1px solid #2a3a2a" }}>
                        <div>
                          <div style={{ fontSize: 14, fontWeight: "bold" }}>{c.name}</div>
                          {c.phone && (
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <a href={`tel:${c.phone}`} style={{ fontSize: 11, color: BLUE, textDecoration: "none" }}>📞 {c.phone}</a>
                              <a href={`https://wa.me/${c.phone.replace(/\D/g, "")}`} target="_blank" rel="noreferrer" style={{ fontSize: 11, color: "#25d366", textDecoration: "none", background: "#1a2e1a", border: "1px solid #25d36644", borderRadius: 6, padding: "1px 7px" }}>WA</a>
                            </div>
                          )}
                        </div>
                        <div style={{ fontWeight: "bold", color: GREEN }}>{formatRub(Math.round(c.monthly))}</div>
                      </div>
                    ))}
                  </div>
                )}
                {stats.overdue.length > 0 && (
                  <div style={{ background: "#2a1a1a", border: `1px solid ${RED}44`, borderRadius: 14, padding: 16, marginBottom: 16 }}>
                    <div style={{ fontSize: 11, color: RED, letterSpacing: 1, marginBottom: 12 }}>⚠ ПРОСРОЧНИКИ</div>
                    {stats.overdue.map(c => (
                      <div key={c.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, paddingBottom: 8, borderBottom: "1px solid #3a2a2a" }}>
                        <div>
                          <div style={{ fontSize: 14, fontWeight: "bold", color: RED }}>{c.name}</div>
                          {c.phone && (
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <a href={`tel:${c.phone}`} style={{ fontSize: 11, color: BLUE, textDecoration: "none" }}>📞 {c.phone}</a>
                              <a href={`https://wa.me/${c.phone.replace(/\D/g, "")}`} target="_blank" rel="noreferrer" style={{ fontSize: 11, color: "#25d366", textDecoration: "none", background: "#1a2e1a", border: "1px solid #25d36644", borderRadius: 6, padding: "1px 7px" }}>WA</a>
                            </div>
                          )}
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ color: RED, fontWeight: "bold" }}>{formatRub(c.remaining - c.paid)}</div>
                          <div style={{ fontSize: 10, color: "#555" }}>долг</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
                  {[
                    { label: "Активных клиентов", value: stats.active.length, color: GOLD },
                    { label: "Просрочек", value: stats.overdue.length, color: stats.overdue.length > 0 ? RED : "#444" },
                    { label: "Общий долг", value: formatRub(stats.totalDebt), color: RED },
                    { label: "Получено всего", value: formatRub(stats.totalReceived), color: GREEN },
                    { label: "Прибыль", value: formatRub(stats.totalProfit), color: GOLD },
                    { label: "Ожид. в этом мес.", value: formatRub(stats.nextMonth), color: BLUE },
                  ].map((s, i) => (
                    <div key={i} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: "12px 14px" }}>
                      <div style={{ fontSize: 9, color: "#555", letterSpacing: 1, marginBottom: 6 }}>{s.label.toUpperCase()}</div>
                      <div style={{ fontSize: typeof s.value === "number" ? 24 : 16, fontWeight: "bold", color: s.color }}>{s.value}</div>
                    </div>
                  ))}
                </div>
                <QuickCalc />
              </div>
            )}

            {tab === "clients" && (
              <div>
                <div style={{ position: "relative", marginBottom: 12 }}>
                  <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#555" }}>🔍</span>
                  <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Поиск по имени или телефону..." style={{ ...inputStyle, paddingLeft: 36 }} />
                </div>
                <div style={{ display: "flex", gap: 6, marginBottom: 14, overflowX: "auto", paddingBottom: 4 }}>
                  {[{ key: "all", label: "Все" }, ...Object.entries(STATUS_CONFIG).map(([k, v]) => ({ key: k, label: v.icon + " " + v.label }))].map(f => (
                    <button key={f.key} onClick={() => setFilterStatus(f.key)} style={{ padding: "6px 12px", borderRadius: 20, border: `1px solid ${filterStatus === f.key ? GOLD : BORDER}`, background: filterStatus === f.key ? "#2a2a1a" : "#12121a", color: filterStatus === f.key ? GOLD : "#666", cursor: "pointer", fontSize: 11, whiteSpace: "nowrap", fontFamily: "inherit" }}>
                      {f.label}
                    </button>
                  ))}
                  <select value={sortAlpha} onChange={e => setSortAlpha(e.target.value)} style={{ padding: "6px 12px", borderRadius: 20, border: `1px solid ${BLUE}`, background: "#1a1a2a", color: BLUE, cursor: "pointer", fontSize: 11, fontFamily: "inherit", outline: "none" }}>
                    <option value="alpha_asc">🔤 А → Я</option>
                    <option value="alpha_desc">🔤 Я → А</option>
                    <option value="date_asc">📅 Старые → Новые</option>
                    <option value="date_desc">📅 Новые → Старые</option>
                    <option value="sum_asc">💰 Сумма ↑</option>
                    <option value="sum_desc">💰 Сумма ↓</option>
                  </select>
                </div>
                {clients.length === 0 && (
                  <div style={{ textAlign: "center", padding: "50px 20px", color: "#444" }}>
                    <div style={{ fontSize: 44, marginBottom: 12 }}>📋</div>
                    <div>Нажмите ➕ чтобы добавить клиента</div>
                  </div>
                )}
                {filtered.length > 0 && <SectionLabel text="АКТИВНЫЕ" />}
                {filtered.map(c => (
                  <ClientCard key={c.id} c={c} onDelete={deleteClient} onPayment={markPayment} onPartialPayment={markPartialPayment} onOverdue={toggleOverdue} onArchive={archiveClient} onStatusChange={updateStatus} onCommentChange={updateComment} overdue={c.overdueMarked || isOverdue(c)} dueToday={isDueToday(c)} />
                ))}
                {filteredDone.length > 0 && <SectionLabel text="ЗАВЕРШЁННЫЕ" />}
                {filteredDone.map(c => (
                  <ClientCard key={c.id} c={c} onDelete={deleteClient} onPayment={markPayment} onPartialPayment={markPartialPayment} onOverdue={toggleOverdue} onArchive={archiveClient} onStatusChange={updateStatus} onCommentChange={updateComment} done />
                ))}
                {archived.length > 0 && (
                  <div style={{ marginTop: 20 }}>
                    <button onClick={() => setShowArchive(s => !s)} style={{ width: "100%", padding: "12px", background: "#12121a", border: `1px solid ${BORDER}`, borderRadius: 12, color: "#666", cursor: "pointer", fontFamily: "inherit", fontSize: 13 }}>
                      📦 Архив ({archived.length} клиентов) {showArchive ? "▲" : "▼"}
                    </button>
                    {showArchive && (
                      <div style={{ marginTop: 10 }}>
                        {archived.map(c => (
                          <div key={c.id} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: "12px 14px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", opacity: 0.7 }}>
                            <div>
                              <div style={{ fontSize: 14, fontWeight: "bold" }}>{c.name}</div>
                              <div style={{ fontSize: 11, color: "#555" }}>Архивирован {c.archivedDate}</div>
                            </div>
                            <button onClick={() => unarchiveClient(c.id)} style={{ padding: "8px 12px", background: "#1a2a1a", color: GREEN, border: `1px solid ${GREEN}44`, borderRadius: 8, cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>
                              Восстановить
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {tab === "add" && (
              <div>
                <div style={{ fontSize: 17, fontWeight: "bold", color: GOLD, marginBottom: 18 }}>Новый клиент</div>
                <div style={{ display: "flex", gap: 16, justifyContent: "center", marginBottom: 18 }}>
                  <ImagePicker value={form.photoItem} onChange={v => setForm(f => ({ ...f, photoItem: v }))} label="ФОТО ТОВАРА" size={90} />
                  <ImagePicker value={form.photoDoc} onChange={v => setForm(f => ({ ...f, photoDoc: v }))} label="ДОКУМЕНТ/РАСПИСКА" size={90} />
                </div>
                <Field label="Имя клиента">
                  <input value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Иван Петров" style={inputStyle} />
                </Field>
                <Field label="Телефон (необязательно)">
                  <input value={form.phone} onChange={e => setForm(f => ({ ...f, phone: e.target.value }))} placeholder="+7 900 000 00 00" style={inputStyle} type="tel" />
                </Field>
                <Field label="Статус клиента">
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    {Object.entries(STATUS_CONFIG).map(([k, v]) => (
                      <button key={k} onClick={() => setForm(f => ({ ...f, status: k }))} style={{ padding: "10px 8px", borderRadius: 10, border: `1px solid ${form.status === k ? v.color : BORDER}`, background: form.status === k ? v.color + "22" : "#12121a", color: form.status === k ? v.color : "#666", cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>
                        {v.icon} {v.label}
                      </button>
                    ))}
                  </div>
                </Field>
                <Field label="Цена товара (₽)">
                  <input type="number" value={form.price} onChange={e => setForm(f => ({ ...f, price: e.target.value }))} placeholder="100 000" style={inputStyle} />
                </Field>
                <Field label="Себестоимость товара (₽) — необязательно">
                  <input type="number" value={form.costPrice} onChange={e => setForm(f => ({ ...f, costPrice: e.target.value }))} placeholder="80 000" style={inputStyle} />
                </Field>
                <Field label="Срок рассрочки (месяцев)">
                  <input type="number" value={form.months} onChange={e => setForm(f => ({ ...f, months: e.target.value }))} placeholder="6" style={inputStyle} />
                </Field>
                <Field label="Дата первого платежа">
                  <input type="date" value={form.nextPaymentDate} onChange={e => setForm(f => ({ ...f, nextPaymentDate: e.target.value }))} style={inputStyle} />
                </Field>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, padding: 14, background: CARD, borderRadius: 10, border: `1px solid ${BORDER}` }}>
                  <input type="checkbox" id="adv" checked={form.hasAdvance} onChange={e => setForm(f => ({ ...f, hasAdvance: e.target.checked, advance: "" }))} style={{ width: 18, height: 18, accentColor: GOLD, cursor: "pointer" }} />
                  <label htmlFor="adv" style={{ cursor: "pointer", fontSize: 14 }}>Есть первоначальный взнос</label>
                </div>
                {form.hasAdvance && (
                  <Field label="Сумма взноса (₽)">
                    <input type="number" value={form.advance} onChange={e => setForm(f => ({ ...f, advance: e.target.value }))} placeholder="20 000" style={inputStyle} />
                  </Field>
                )}
                <Field label="Комментарий (необязательно)">
                  <textarea value={form.comment} onChange={e => setForm(f => ({ ...f, comment: e.target.value }))} placeholder="Живёт на ул. Ленина, платит через жену..." rows={3} style={{ ...inputStyle, resize: "vertical" }} />
                </Field>

                <div style={{ background: "#1a1a2a", border: `1px solid #3a3a5a`, borderRadius: 12, padding: 14, marginBottom: 14 }}>
                  <div style={{ fontSize: 11, color: BLUE, letterSpacing: 1, marginBottom: 14 }}>🤝 ПОРУЧИТЕЛЬ (необязательно)</div>
                  <div style={{ display: "flex", justifyContent: "center", marginBottom: 14 }}>
                    <ImagePicker value={form.guarantorPhoto} onChange={v => setForm(f => ({ ...f, guarantorPhoto: v }))} label="ФОТО ПОРУЧИТЕЛЯ" size={80} />
                  </div>
                  <Field label="Имя поручителя">
                    <input value={form.guarantorName} onChange={e => setForm(f => ({ ...f, guarantorName: e.target.value }))} placeholder="Иван Иванов" style={inputStyle} />
                  </Field>
                  <Field label="Телефон поручителя">
                    <input value={form.guarantorPhone} onChange={e => setForm(f => ({ ...f, guarantorPhone: e.target.value }))} placeholder="+7 900 000 00 00" style={inputStyle} type="tel" />
                  </Field>
                </div>
                {preview && (
                  <div style={{ background: "linear-gradient(135deg, #1e1e2e, #1a1a28)", border: `1px solid ${GOLD}33`, borderRadius: 14, padding: 16, marginBottom: 16 }}>
                    <div style={{ fontSize: 10, color: GOLD, letterSpacing: 2, marginBottom: 12 }}>ПРЕДВАРИТЕЛЬНЫЙ РАСЧЁТ</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      {[
                        { label: "Ставка", value: `${preview.rate}%` },
                        { label: "Итоговая сумма", value: formatRub(preview.total) },
                        { label: "Ежемесячно", value: formatRub(Math.round(preview.monthly)) },
                        { label: preview.hasCost ? "Полная прибыль" : "Прибыль (проценты)", value: formatRub(Math.round(preview.hasCost ? preview.profitTotal : preview.profitPercent)) },
                      ].map((item, i) => (
                        <div key={i}>
                          <div style={{ fontSize: 9, color: "#666", marginBottom: 3 }}>{item.label}</div>
                          <div style={{ fontSize: i === 2 ? 20 : 14, fontWeight: "bold", color: i === 2 ? GOLD : i === 3 ? GREEN : "#e8e4dc" }}>{item.value}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {formError && <div style={{ color: RED, marginBottom: 12, fontSize: 12 }}>⚠ {formError}</div>}
                <button onClick={addClient} style={{ width: "100%", padding: 15, background: `linear-gradient(135deg, #c9a84c, ${GOLD})`, color: BG, border: "none", borderRadius: 12, fontSize: 15, fontWeight: "bold", cursor: "pointer", fontFamily: "inherit", letterSpacing: 1 }}>
                  ДОБАВИТЬ КЛИЕНТА
                </button>
              </div>
            )}

            {tab === "cassa" && (
              <div>
                <div style={{ background: "linear-gradient(135deg, #1e1e2e, #1a1a28)", border: `1px solid ${GOLD}33`, borderRadius: 16, padding: 22, marginBottom: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: "#555", letterSpacing: 2, marginBottom: 8 }}>БАЛАНС КАССЫ</div>
                  <div style={{ fontSize: 36, fontWeight: "bold", color: cassa.balance >= 0 ? GREEN : RED }}>{formatRub(cassa.balance)}</div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
                  <div style={{ background: "#1a2a1a", border: "1px solid #2a3a2a", borderRadius: 12, padding: 14 }}>
                    <div style={{ fontSize: 9, color: GREEN, letterSpacing: 1, marginBottom: 6 }}>ИНВЕСТИЦИИ</div>
                    <div style={{ fontSize: 18, fontWeight: "bold", color: GREEN }}>{formatRub(cassa.investments.reduce((s, o) => s + o.amount, 0))}</div>
                  </div>
                  <div style={{ background: "#2a1a1a", border: "1px solid #3a2a2a", borderRadius: 12, padding: 14 }}>
                    <div style={{ fontSize: 9, color: RED, letterSpacing: 1, marginBottom: 6 }}>СНЯТО</div>
                    <div style={{ fontSize: 18, fontWeight: "bold", color: RED }}>{formatRub(cassa.withdrawals.reduce((s, o) => s + o.amount, 0))}</div>
                  </div>
                </div>
                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 14, padding: 16, marginBottom: 16 }}>
                  <div style={{ fontSize: 11, color: GOLD, marginBottom: 12 }}>НОВАЯ ОПЕРАЦИЯ</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
                    {[{ key: "investment", label: "💹 Инвестиция" }, { key: "withdrawal", label: "💸 Снятие" }].map(t => (
                      <button key={t.key} onClick={() => setCassaForm(f => ({ ...f, type: t.key }))} style={{ padding: "11px 8px", background: cassaForm.type === t.key ? (t.key === "investment" ? "#1a3a1a" : "#3a1a1a") : "#12121a", border: `1px solid ${cassaForm.type === t.key ? (t.key === "investment" ? GREEN : RED) : BORDER}`, color: cassaForm.type === t.key ? (t.key === "investment" ? GREEN : RED) : "#555", borderRadius: 10, cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>{t.label}</button>
                    ))}
                  </div>
                  <input type="number" value={cassaForm.amount} onChange={e => setCassaForm(f => ({ ...f, amount: e.target.value }))} placeholder="Сумма (₽)" style={{ ...inputStyle, marginBottom: 8 }} />
                  <input value={cassaForm.note} onChange={e => setCassaForm(f => ({ ...f, note: e.target.value }))} placeholder="Примечание" style={{ ...inputStyle, marginBottom: 12 }} />
                  <button onClick={addCassaOp} style={{ width: "100%", padding: 13, background: cassaForm.type === "investment" ? "linear-gradient(135deg, #2a5a2a, #3a7a3a)" : "linear-gradient(135deg, #5a2a2a, #7a3a3a)", color: "#fff", border: "none", borderRadius: 10, fontSize: 13, fontWeight: "bold", cursor: "pointer", fontFamily: "inherit" }}>
                    {cassaForm.type === "investment" ? "ДОБАВИТЬ ИНВЕСТИЦИЮ" : "ЗАПИСАТЬ СНЯТИЕ"}
                  </button>
                </div>
                {[...cassa.investments, ...cassa.withdrawals].sort((a, b) => b.id - a.id).map(op => (
                  <div key={op.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", background: CARD, border: `1px solid ${op.type === "investment" ? "#2a3a2a" : "#3a2a2a"}`, borderRadius: 10, marginBottom: 8 }}>
                    <div>
                      <div style={{ fontSize: 13 }}>{op.type === "investment" ? "💹" : "💸"} {op.note || (op.type === "investment" ? "Инвестиция" : "Снятие")}</div>
                      <div style={{ fontSize: 10, color: "#555", marginTop: 3 }}>{op.date}</div>
                    </div>
                    <div style={{ fontWeight: "bold", fontSize: 15, color: op.type === "investment" ? GREEN : RED }}>
                      {op.type === "investment" ? "+" : "−"}{formatRub(op.amount)}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {tab === "report" && (
              <div>
                <div style={{ fontSize: 17, fontWeight: "bold", color: GOLD, marginBottom: 18 }}>📊 Аналитика</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 18 }}>
                  {[
                    { label: "Общий долг", value: formatRub(stats.totalDebt), color: RED },
                    { label: "Получено платежей", value: formatRub(stats.totalReceived), color: GREEN },
                    { label: "Прибыль", value: formatRub(stats.totalProfit), color: GOLD },
                    { label: "Ожид. в этом мес.", value: formatRub(stats.nextMonth), color: BLUE },
                  ].map((s, i) => (
                    <div key={i} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 14 }}>
                      <div style={{ fontSize: 9, color: "#555", letterSpacing: 1, marginBottom: 8 }}>{s.label.toUpperCase()}</div>
                      <div style={{ fontSize: 15, fontWeight: "bold", color: s.color }}>{s.value}</div>
                    </div>
                  ))}
                </div>
                {clients.length > 0 && (
                  <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 14, padding: 18, marginBottom: 16 }}>
                    <div style={{ fontSize: 11, color: GOLD, letterSpacing: 1, marginBottom: 14 }}>КЛИЕНТЫ ПО СТАТУСАМ</div>
                    {Object.entries(STATUS_CONFIG).map(([k, v]) => {
                      const count = clients.filter(c => c.status === k).length;
                      if (!count) return null;
                      return (
                        <div key={k} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 16 }}>{v.icon}</span>
                            <span style={{ fontSize: 13, color: v.color }}>{v.label}</span>
                          </div>
                          <span style={{ fontSize: 16, fontWeight: "bold", color: v.color }}>{count}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
                {clients.length > 0 && (
                  <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 14, padding: 18, marginBottom: 16 }}>
                    <div style={{ fontSize: 11, color: GOLD, letterSpacing: 1, marginBottom: 14 }}>СТРУКТУРА ПОРТФЕЛЯ</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                      <PieChart slices={[
                        { value: stats.totalDebt, color: RED },
                        { value: stats.totalReceived, color: GREEN },
                        { value: Math.max(0, cassa.balance), color: GOLD },
                      ]} size={110} />
                      <div style={{ flex: 1 }}>
                        {[
                          { label: "Долг клиентов", value: formatRub(stats.totalDebt), color: RED },
                          { label: "Получено", value: formatRub(stats.totalReceived), color: GREEN },
                          { label: "Касса", value: formatRub(cassa.balance), color: GOLD },
                        ].map((item, i) => (
                          <div key={i} style={{ display: "flex", justifyContent: "space-between", marginBottom: 10, alignItems: "center" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <div style={{ width: 8, height: 8, borderRadius: "50%", background: item.color }} />
                              <span style={{ fontSize: 12, color: "#aaa" }}>{item.label}</span>
                            </div>
                            <span style={{ fontSize: 13, fontWeight: "bold", color: item.color }}>{item.value}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
                {Object.keys(stats.monthly).length > 0 && (
                  <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 14, padding: 18, marginBottom: 16 }}>
                    <div style={{ fontSize: 11, color: GOLD, letterSpacing: 1, marginBottom: 14 }}>ПЛАТЕЖИ ПО МЕСЯЦАМ</div>
                    {Object.entries(stats.monthly).sort().reverse().slice(0, 6).map(([month, amount]) => {
                      const max = Math.max(...Object.values(stats.monthly));
                      const pct = (amount / max) * 100;
                      return (
                        <div key={month} style={{ marginBottom: 10 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, fontSize: 12 }}>
                            <span style={{ color: "#888" }}>{month}</span>
                            <span style={{ color: GREEN, fontWeight: "bold" }}>{formatRub(amount)}</span>
                          </div>
                          <div style={{ background: "#0f0f13", borderRadius: 4, height: 5 }}>
                            <div style={{ width: `${pct}%`, height: "100%", background: `linear-gradient(90deg, #2a7a2a, ${GREEN})`, borderRadius: 4 }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                <button onClick={exportCSV} style={{ width: "100%", padding: 14, background: "linear-gradient(135deg, #1a2a3a, #2a3a4a)", color: BLUE, border: `1px solid #2a4a5a`, borderRadius: 12, fontSize: 13, fontWeight: "bold", cursor: "pointer", fontFamily: "inherit", letterSpacing: 1 }}>
                  📥 СКАЧАТЬ EXCEL / CSV
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
